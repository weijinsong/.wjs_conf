# ============================================================
# tmux 配置模板
# 适用版本：tmux 2.9+ (支持 true color 和鼠标特性)
# 文件位置：~/.tmux.conf
# ============================================================

# ---------------------- 基础设置 ----------------------
# 设置默认终端类型（支持真彩色）
set -g default-terminal "tmux-256color"

# 启用真彩色（确保终端支持）
set-option -ga terminal-overrides ",*:Tc"

# 设置前缀键（默认为 Ctrl-b，您可以按需修改）
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# 重新加载配置文件（快捷键：prefix + r）
bind r source-file ~/.tmux.conf \; display "配置已重新加载！"

# ---------------------- 鼠标支持 ----------------------
# 开启鼠标支持（选中窗格、调整大小、滚动历史、选择文本等）
set -g mouse on
# 注意：启用 mouse 后，默认点击即可选中窗格/调整大小。
# 若想复制文本，通常需按住 Shift 键并用鼠标选择，或用 prefix + Enter 进入复制模式。
set -g word-separators ""
# 标准配置：双击选单词，三击选整行
bind-key -T copy-mode-vi DoubleClick1Pane send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane send-keys -X select-line

# 增强配置：选择后自动复制（需安装 xclip）
# bind-key -T copy-mode-vi DoubleClick1Pane { send-keys -X select-word; run-shell -d 0.3 "tmux send-keys -X copy-pipe \"xclip -i -sel clip\"" }
# bind-key -T copy-mode-vi TripleClick1Pane { send-keys -X select-line; run-shell -d 0.3 "tmux send-keys -X copy-pipe \"xclip -i -sel clip\"" }

# ---------------------- 分屏快捷键 ----------------------
# 水平分屏（左右分屏）: prefix + h
unbind %
unbind h
bind h split-window -h

# 垂直分屏（上下分屏）: prefix + "
unbind '"'
unbind v
bind v split-window -v

# 分屏后快速切换窗格（使用箭头，无需前缀）
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# 若不想被覆盖终端本身的快捷键，可改用 prefix + 方向键
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# ---------------------- 全屏快捷键（Zoom 窗格）---------------------
# 最大化/恢复当前窗格: prefix + z（默认）

bind y resize-pane -Z

# 也可绑定其他键，例如 prefix + f（如果需要），这里保留默认

# ---------------------- 窗口大小调节快捷键 ----------------------
# 调整窗格大小（每按一次调整 5 个单元格）
# 使用前缀 + Ctrl + 方向键（需启用 repeat 特性）
bind -r C-Left resize-pane -L 5
bind -r C-Down resize-pane -D 5
bind -r C-Up resize-pane -U 5
bind -r C-Right resize-pane -R 5

# 另一种调节方式：prefix + Alt + 方向键（每步 1 个单元格）
bind -r M-Left resize-pane -L 1
bind -r M-Down resize-pane -D 1
bind -r M-Up resize-pane -U 1
bind -r M-Right resize-pane -R 1

# ---------------------- 其他常用快捷键 ----------------------
# 新建窗口: prefix + c
bind c new-window

# 关闭当前窗口/窗格: prefix + &
bind & confirm-before -p "关闭窗口 (窗口 #W)?" kill-window

# 切换窗口: prefix + 数字（0-9）或 prefix + n/p（next/previous）
bind n next-window
bind p previous-window

# 列出窗口: prefix + w
bind w choose-window

# 重命名当前窗口: prefix + ,
bind , command-prompt "rename-window '%%'"

# 重命名当前会话: prefix + $
bind '$' command-prompt "rename-session '%%'"

# 显示时间: prefix + t
bind t clock-mode

# 进入复制模式（可滚动历史）: prefix + [
bind '[' copy-mode

# 退出复制模式: Enter 或 q
# 在复制模式中按 v 开始选择，按 y 复制到剪贴板（需支持 xclip 或 pbcopy）

# 窗格交换: prefix + { 和 } 向左/右移动当前窗格
bind '{' swap-pane -U
bind '}' swap-pane -D

# 强制重新加载 tmux 环境（当环境变量改变时）
bind F1 run-shell 'tmux source-file ~/.tmux.conf'

# ---------------------- 状态栏美化（可选）---------------------
# 启用状态栏并设置刷新间隔
set -g status on
set -g status-interval 2

# 状态栏颜色（示例：深色背景+亮色文本）
set -g status-style "fg=white,bg=black"

# 左侧显示会话名称和窗口列表
set -g status-left "#[fg=green]#S "
set -g status-left-length 50

# 右侧显示系统时间
set -g status-right "#[fg=yellow]%H:%M #[fg=cyan]%Y-%m-%d"
set -g status-right-length 50

# 窗口样式（当前窗口高亮）
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[fg=white,bg=red]#I:#W#[default] "

# 活动窗口标记
set -g window-status-activity-style "fg=red,bg=default"

# 
set -g allow-passthrough on


# ---------------------- 注意事项 ----------------------
# 1. 若终端不支持真彩色，请将 default-terminal 改为 "screen-256color" 并移除 Tc 设置。
# 2. 鼠标选择复制时若遇到问题（如无法复制），按住 Shift 键再用鼠标选择。
# 3. 调整窗格大小的快捷键使用了 -r 参数，表示可以重复执行（按住键连续调整）。
# 4. 若快捷键与本地终端冲突（如 C-h 被用作退格），请将开头的 `bind -n C-h` 等注释掉。
